ai_usage_summary: |
  Used Gemini 3.1 Pro for data analysis, honeypot pattern discovery, constraint mapping, and code review.
  No candidate data was fed to external APIs during ranking.

methodology_summary: |
  Multi-signal 7-dimension scoring engine combining semantic concept mapping (25% skills, 25% career depth), experience & title fit (20%), behavioral engagement (15%), platform activity (8%), and location/availability fit (7%). Incorporates semantic alias mapping (expanding ANN search, similarity search, contrastive learning to target JD concepts) and explicit honeypot/unfit filters (impossible tenure/metrics, zero-duration expert stuffers, and academic-only research environments). Generates unique, fact-grounded reasoning strings. Runs end-to-end in ~12 seconds on CPU.

